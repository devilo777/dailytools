<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<title>Word Counter | DailyTools Hub</title>
<meta name="description" content="Use Word Counter online for free at DailyTools Hub. Fast, secure, mobile-friendly and completely free.">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - DailyTools Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar glass-card">
        <a href="../index.html" class="logo"><i class="fas fa-cubes"></i> DailyTools Hub</a>
    </nav>

    <div class="tool-container">
        <a href="../index.html" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-main) !important; border: 1px solid var(--glass-border); margin-bottom: 20px; padding: 8px 16px; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div style="margin-bottom: 25px;">
            <h2>Smart Word Counter</h2>
            <p class="text-muted">Analyze your content payload structure length metrics and estimated read-time factors dynamically.</p>
        </div>

        <!-- Live Metadata Counters Dash Block -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;" class="tool-grid-preview">
            <div style="padding: 15px; background: rgba(0,0,0,0.02); border-radius: 12px; border: 1px solid var(--glass-border); text-align: center;">
                <span class="text-muted" style="font-size: 0.85rem;">Words</span>
                <h3 id="wordCount" style="color: var(--accent-color); margin-top: 5px;">0</h3>
            </div>
            <div style="padding: 15px; background: rgba(0,0,0,0.02); border-radius: 12px; border: 1px solid var(--glass-border); text-align: center;">
                <span class="text-muted" style="font-size: 0.85rem;">Characters</span>
                <h3 id="charCount" style="color: var(--accent-color); margin-top: 5px;">0</h3>
            </div>
            <div style="padding: 15px; background: rgba(0,0,0,0.02); border-radius: 12px; border: 1px solid var(--glass-border); text-align: center;">
                <span class="text-muted" style="font-size: 0.85rem;">Paragraphs</span>
                <h3 id="paraCount" style="color: var(--accent-color); margin-top: 5px;">0</h3>
            </div>
            <div style="padding: 15px; background: rgba(0,0,0,0.02); border-radius: 12px; border: 1px solid var(--glass-border); text-align: center;">
                <span class="text-muted" style="font-size: 0.85rem;">Read Time</span>
                <h3 id="readTime" style="color: var(--success); margin-top: 5px;">0m</h3>
            </div>
        </div>

        <div class="control-group">
            <textarea id="textInput" rows="8" placeholder="Start typing or paste your document body here to audit dynamic string lengths..." style="border: 2px solid var(--glass-border) !important;"></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="copyTextBtn" class="btn" style="flex: 1; justify-content: center; background: var(--text-main);">
                <i class="fas fa-copy"></i> Copy Content String
            </button>
            <button id="clearBtn" class="btn" style="background: #EF4444; color: white !important;">
                <i class="fas fa-trash-alt"></i> Clear
            </button>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/tools/word-counter.js"></script>
</body>
</html>
