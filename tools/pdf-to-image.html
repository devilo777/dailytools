<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image - DailyTools Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Essential PDF rendering matrix loader dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>

    <nav class="navbar glass-card">
        <a href="../index.html" class="logo"><i class="fas fa-cubes"></i> DailyTools Hub</a>
    </nav>

    <div class="tool-container">
        <a href="../index.html" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-main) !important; border: 1px solid var(--glass-border); margin-bottom: 20px; padding: 8px 16px; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div style="margin-bottom: 25px;">
            <h2>PDF to Image Converter</h2>
            <p class="text-muted">Extract high-resolution pages from PDF documents into separate JPG files instantly.</p>
        </div>

        <div class="upload-zone" id="pdfDropZone">
            <i class="fas fa-file-pdf" style="color: #EF4444;"></i>
            <h4>Click or Drag PDF Document Here</h4>
            <p class="text-muted" style="font-size: 0.85rem; margin-top: 5px;">Strict file boundary: .pdf formats</p>
            <input type="file" id="pdfFile" accept="application/pdf" style="display: none;">
        </div>

        <!-- Render grid list box for previewing and downloading extracted pages -->
        <div id="pdfPreviewContainer" class="tool-grid-preview" style="margin-top: 25px; border-top: 1px dashed var(--glass-border); padding-top: 20px;"></div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/tools/pdf-to-image.js"></script>
</body>
</html>
