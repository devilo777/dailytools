<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator - DailyTools Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR generation rendering engine dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <nav class="navbar glass-card">
        <a href="../index.html" class="logo"><i class="fas fa-cubes"></i> DailyTools Hub</a>
    </nav>

    <div class="tool-container" style="max-width: 700px;">
        <a href="../index.html" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-main) !important; border: 1px solid var(--glass-border); margin-bottom: 20px; padding: 8px 16px; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div style="margin-bottom: 25px;">
            <h2>Custom QR Code Generator</h2>
            <p class="text-muted">Generate clean vector graphic QR badges for website URLs or alphanumeric strings.</p>
        </div>

        <div class="glass-card" style="padding: 25px; border: 2px solid var(--glass-border); margin-bottom: 25px;">
            <div class="control-group">
                <label>Enter URL or Plain Text Matrix</label>
                <input type="text" id="qrTextPayload" placeholder="Paste link here (e.g. https://google.com)">
            </div>
            
            <button id="generateQrBtn" class="btn" style="width: 100%; justify-content: center; margin-top: 15px; padding: 14px;">
                <i class="fas fa-qrcode"></i> Build QR Code
            </button>
        </div>

        <!-- Live Display Node Center Box -->
        <div style="text-align: center; margin-top: 10px;">
            <div id="qrOutputGraphic" style="display: inline-block; padding: 15px; background: #ffffff; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 15px;"></div>
            <br>
            <button id="downloadQrBtn" class="btn" style="background: var(--success); display: none; padding: 12px 30px;">
                <i class="fas fa-download"></i> Save QR Code Badge
            </button>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/tools/qr-generator.js"></script>
</body>
</html>
