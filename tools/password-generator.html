<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - DailyTools Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar glass-card">
        <a href="../index.html" class="logo"><i class="fas fa-cubes"></i> DailyTools Hub</a>
    </nav>

    <div class="tool-container" style="max-width: 650px;">
        <a href="../index.html" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-main) !important; border: 1px solid var(--glass-border); margin-bottom: 20px; padding: 8px 16px; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div style="margin-bottom: 25px;">
            <h2>Secure Password Generator</h2>
            <p class="text-muted">Create ultra-strong, random cryptographic keys instantly to guard your data fields.</p>
        </div>

        <!-- Output Result Panel Box -->
        <div class="glass-card" style="padding: 20px; border: 2px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.01);">
            <h3 id="passwordResult" style="font-family: monospace; letter-spacing: 1px; word-break: break-all; color: var(--accent-color);">Click Generate</h3>
            <button id="copyPass" class="btn" style="padding: 8px 16px; font-size: 0.85rem; background: var(--text-main); color: var(--body-bg) !important;">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <!-- Dynamic Password Strength Tracker Meter -->
        <div style="margin-bottom: 25px;">
            <div style="height: 6px; width: 100%; background: var(--glass-border); border-radius: 4px; overflow: hidden;">
                <div id="strengthBar" style="height: 100%; width: 0%; transition: all 0.3s ease;"></div>
            </div>
            <span id="strengthText" class="text-muted" style="font-size: 0.8rem; display: block; margin-top: 5px; font-weight: 500;">Strength: Not calculated</span>
        </div>

        <!-- Configurations Selection Layer -->
        <div class="glass-card" style="padding: 20px; border: 1px solid var(--glass-border);">
            <div class="control-group" style="margin-bottom: 20px;">
                <label style="display: flex; justify-content: space-between;">
                    <span>Password Character Length</span>
                    <span id="lengthVal" style="font-weight: bold; color: var(--accent-color);">16</span>
                </label>
                <input type="range" id="passLength" min="6" max="50" value="16">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="incUppercase" checked style="width: auto; margin: 0;">
                    <label for="incUppercase" style="font-size: 0.9rem;">Uppercase (A-Z)</label>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="incLowercase" checked style="width: auto; margin: 0;">
                    <label for="incLowercase" style="font-size: 0.9rem;">Lowercase (a-z)</label>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="incNumbers" checked style="width: auto; margin: 0;">
                    <label for="incNumbers" style="font-size: 0.9rem;">Numbers (0-9)</label>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="incSymbols" checked style="width: auto; margin: 0;">
                    <label for="incSymbols" style="font-size: 0.9rem;">Symbols (@#$-+)</label>
                </div>
            </div>

            <button id="generateBtn" class="btn" style="width: 100%; justify-content: center; margin-top: 25px; padding: 14px;">
                <i class="fas fa-key"></i> Generate Security Key
            </button>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/tools/password-generator.js"></script>
</body>
</html>
